name: Debian Package Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v6.13.0)'
        required: true
      suites:
        description: 'Debian suites (space-separated, e.g. "bullseye bookworm")'
        required: false
        default: 'bullseye bookworm'

permissions:
  id-token: write
  contents: read

jobs:
  build-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.GITIAN_AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Parse inputs
      id: inputs
      run: |
        TAG="${{ inputs.tag }}"
        SUITES="${{ inputs.suites }}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "suites=$SUITES" >> "$GITHUB_OUTPUT"
        echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq python3 dpkg-dev
        pip install awscli 2>/dev/null || sudo apt-get install -y -qq awscli 2>/dev/null || true

    - name: Import GPG keys
      env:
        AWS_REGION: us-east-1
      run: |
        aws secretsmanager get-secret-value \
          --secret-id /release/gpg-signing-key-zcash \
          --query SecretString --output text > /tmp/ecc-private.pgp
        aws secretsmanager get-secret-value \
          --secret-id /release/gpg-signing-key \
          --query SecretString --output text > /tmp/zodl-private.pgp
        gpg --batch --import /tmp/ecc-private.pgp
        gpg --batch --import /tmp/zodl-private.pgp
        rm -f /tmp/ecc-private.pgp /tmp/zodl-private.pgp

    - name: Build .deb packages
      env:
        TAG: ${{ steps.inputs.outputs.tag }}
        SUITES: ${{ steps.inputs.outputs.suites }}
        VERSION: ${{ steps.inputs.outputs.version }}
      run: |
        mkdir -p tarballs debs

        for suite in $SUITES; do
          echo "=== Building .deb for $suite ==="

          # Download tarball from S3
          aws s3 cp "s3://zodl-public-download/${VERSION}/${suite}/zcash-${VERSION}-linux64-debian-${suite}.tar.gz" \
            "tarballs/zcash-${VERSION}-${suite}.tar.gz"

          # Extract binaries from tarball
          mkdir -p "extract-${suite}"
          tar -xzf "tarballs/zcash-${VERSION}-${suite}.tar.gz" -C "extract-${suite}" --strip-components=1
          ls -la "extract-${suite}/bin/"

          # Start Debian container with zcash source
          docker run -d --name "${suite}-build" "debian:${suite}" bash -c "while true; do sleep 2; done"
          docker exec "${suite}-build" bash -c "
            apt-get update -qq
            apt-get install -y -qq git build-essential debhelper lintian fakeroot
          "
          docker exec "${suite}-build" git clone -b "${TAG}" --depth 1 https://github.com/zcash/zcash.git /home/build

          # Copy pre-built binaries into src/ where build-debian-package.sh expects them
          docker exec "${suite}-build" mkdir -p /home/build/src
          docker cp "extract-${suite}/bin/zcashd" "${suite}-build:/home/build/src/zcashd"
          docker cp "extract-${suite}/bin/zcash-cli" "${suite}-build:/home/build/src/zcash-cli"
          docker cp "extract-${suite}/bin/zcashd-wallet-tool" "${suite}-build:/home/build/src/zcashd-wallet-tool"
          docker cp "extract-${suite}/bin/zcash-tx" "${suite}-build:/home/build/src/zcash-tx" 2>/dev/null || true

          # Build .deb (lintian exits non-zero on warnings — ignore)
          docker exec -w /home/build "${suite}-build" bash -c "
            chmod +x src/zcashd src/zcash-cli src/zcashd-wallet-tool
            bash ./zcutil/build-debian-package.sh
          " || echo "build-debian-package.sh exited non-zero (lintian warnings are normal)"

          # Copy .deb out — script puts it in /tmp/zcbuild/ AND in /home/build/
          mkdir -p "debs/${suite}"
          docker cp "${suite}-build:/home/build/zcash-${VERSION}-amd64.deb" "debs/${suite}/" 2>/dev/null || \
          docker cp "${suite}-build:/tmp/zcbuild/zcash-${VERSION}-amd64.deb" "debs/${suite}/" 2>/dev/null || \
          docker cp "${suite}-build:/tmp/zcbuild/." "debs/${suite}/" 2>/dev/null || true

          docker rm -f "${suite}-build"

          # Find and rename the .deb
          DEB_FILE=$(find "debs/${suite}" -name "zcash*.deb" | head -1)
          if [ -n "$DEB_FILE" ]; then
            NEW_NAME="debs/${suite}/zcash-${VERSION}-amd64-${suite}.deb"
            mv "$DEB_FILE" "$NEW_NAME"
            echo "Built: $NEW_NAME"
            dpkg-deb -I "$NEW_NAME" | head -20
          else
            echo "ERROR: No .deb found for $suite"
            ls -laR "debs/${suite}/" 2>/dev/null
            exit 1
          fi
        done

    - name: Upload .deb packages to S3
      env:
        VERSION: ${{ steps.inputs.outputs.version }}
        SUITES: ${{ steps.inputs.outputs.suites }}
      run: |
        for suite in $SUITES; do
          DEB="debs/${suite}/zcash-${VERSION}-amd64-${suite}.deb"
          if [ -f "$DEB" ]; then
            aws s3 cp "$DEB" "s3://zodl-apt-server-zcash/pool/main/z/zcash/"
            echo "Uploaded: $DEB"
          fi
        done

    - name: Summary
      env:
        VERSION: ${{ steps.inputs.outputs.version }}
        SUITES: ${{ steps.inputs.outputs.suites }}
      run: |
        echo ""
        echo "=== BUILD COMPLETE ==="
        echo ""
        echo "Uploaded .deb packages:"
        for suite in $SUITES; do
          echo "  s3://zodl-apt-server-zcash/pool/main/z/zcash/zcash-${VERSION}-amd64-${suite}.deb"
        done
        echo ""
        echo "Next step: Run 'APT Repo Update' workflow to update repository metadata"
