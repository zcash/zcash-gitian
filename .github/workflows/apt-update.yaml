name: APT Repo Update

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number without v prefix (e.g. 6.13.0)'
        required: true
      suites:
        description: 'Debian suites (space-separated, e.g. "bullseye bookworm")'
        required: false
        default: 'bullseye bookworm'

permissions:
  id-token: write
  contents: read

jobs:
  update-apt:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.GITIAN_AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq python3 dpkg-dev gnupg

    - name: Import GPG keys
      run: |
        aws secretsmanager get-secret-value \
          --secret-id /release/gpg-signing-key-zcash \
          --query SecretString --output text | gpg --batch --import
        aws secretsmanager get-secret-value \
          --secret-id /release/gpg-signing-key \
          --query SecretString --output text | gpg --batch --import

    - name: Update APT repository metadata
      env:
        VERSION: ${{ inputs.version }}
        SUITES: ${{ inputs.suites }}
      run: |
        BUCKET="zodl-apt-server-zcash"
        WORKDIR="$PWD/apt-build"
        mkdir -p "$WORKDIR"
        cd "$WORKDIR"

        for suite in $SUITES; do
          echo ""
          echo "=== Updating APT metadata for $suite ==="

          DIST_DIR="dists/${suite}"
          BINARY_DIR="${DIST_DIR}/main/binary-amd64"
          mkdir -p "$BINARY_DIR"

          DEB_NAME="zcash-${VERSION}-amd64-${suite}.deb"
          DEB_PATH="pool/main/z/zcash/${DEB_NAME}"

          # Download current Packages (if exists)
          if aws s3 cp "s3://${BUCKET}/${BINARY_DIR}/Packages" "${BINARY_DIR}/Packages" 2>/dev/null; then
            echo "Downloaded existing Packages"
          else
            echo "No existing Packages file — creating new one"
            touch "${BINARY_DIR}/Packages"
          fi

          # Download the new .deb to extract metadata
          aws s3 cp "s3://${BUCKET}/${DEB_PATH}" "${DEB_NAME}"

          # Extract ALL control fields from the .deb
          DEB_SIZE=$(stat -c%s "${DEB_NAME}")
          DEB_MD5=$(md5sum "${DEB_NAME}" | awk '{print $1}')
          DEB_SHA1=$(sha1sum "${DEB_NAME}" | awk '{print $1}')
          DEB_SHA256=$(sha256sum "${DEB_NAME}" | awk '{print $1}')
          DEB_SHA512=$(sha512sum "${DEB_NAME}" | awk '{print $1}')

          export DEB_PATH DEB_SIZE DEB_MD5 DEB_SHA1 DEB_SHA256 DEB_SHA512
          export DEB_PACKAGE=$(dpkg-deb -f "${DEB_NAME}" Package)
          export DEB_VERSION_FULL=$(dpkg-deb -f "${DEB_NAME}" Version)
          export DEB_ARCH=$(dpkg-deb -f "${DEB_NAME}" Architecture)
          export DEB_MAINTAINER=$(dpkg-deb -f "${DEB_NAME}" Maintainer)
          export DEB_DEPENDS=$(dpkg-deb -f "${DEB_NAME}" Depends)
          export DEB_INSTALLED_SIZE=$(dpkg-deb -f "${DEB_NAME}" Installed-Size)
          export DEB_SECTION=$(dpkg-deb -f "${DEB_NAME}" Section)
          export DEB_PRIORITY=$(dpkg-deb -f "${DEB_NAME}" Priority)
          export DEB_HOMEPAGE=$(dpkg-deb -f "${DEB_NAME}" Homepage)
          export DEB_DESCRIPTION=$(dpkg-deb -f "${DEB_NAME}" Description)
          export PACKAGES_FILE="${BINARY_DIR}/Packages"

          # Update Packages file with ALL fields
          python3 <<'PYEOF'
        import os

        env = os.environ
        packages_file = env['PACKAGES_FILE']

        with open(packages_file, 'r') as f:
            content = f.read()

        stanzas = content.split('\n\n')
        new_stanzas = [s for s in stanzas if s.strip()
                       and not (f"Version: {env['DEB_VERSION_FULL']}" in s
                                and f"Package: {env['DEB_PACKAGE']}" in s)]

        desc_lines = env['DEB_DESCRIPTION'].split('\n')
        desc_formatted = desc_lines[0]
        for line in desc_lines[1:]:
            desc_formatted += '\n ' + line

        new_entry = f"""Package: {env['DEB_PACKAGE']}
        Priority: {env['DEB_PRIORITY']}
        Section: {env['DEB_SECTION']}
        Installed-Size: {env['DEB_INSTALLED_SIZE']}
        Maintainer: {env['DEB_MAINTAINER']}
        Architecture: {env['DEB_ARCH']}
        Version: {env['DEB_VERSION_FULL']}
        Depends: {env['DEB_DEPENDS']}
        Filename: {env['DEB_PATH']}
        Size: {env['DEB_SIZE']}
        MD5sum: {env['DEB_MD5']}
        SHA1: {env['DEB_SHA1']}
        SHA256: {env['DEB_SHA256']}
        SHA512: {env['DEB_SHA512']}
        Description: {desc_formatted}
        Homepage: {env['DEB_HOMEPAGE']}"""

        # Remove leading whitespace from heredoc indentation
        new_entry = '\n'.join(line.lstrip() for line in new_entry.split('\n'))
        new_stanzas.append(new_entry)

        with open(packages_file, 'w') as f:
            f.write('\n\n'.join(new_stanzas) + '\n')

        print(f"Updated Packages: {env['DEB_PACKAGE']} {env['DEB_VERSION_FULL']}")
        PYEOF

          # Compress Packages
          gzip -9 -k -f "${BINARY_DIR}/Packages"

          # Generate Release file with ALL hash types
          PKGFILE="${BINARY_DIR}/Packages"
          GZFILE="${BINARY_DIR}/Packages.gz"
          cat > "${DIST_DIR}/Release" <<RELEOF
        Origin: Zcash
        Label: Zcash
        Suite: ${suite}
        Codename: ${suite}
        Architectures: amd64
        Components: main
        Description: Zcash APT Repository
        Date: $(date -u "+%a, %d %b %Y %H:%M:%S UTC")
        MD5Sum:
         $(md5sum "$PKGFILE" | awk '{print $1}') $(stat -c%s "$PKGFILE") main/binary-amd64/Packages
         $(md5sum "$GZFILE" | awk '{print $1}') $(stat -c%s "$GZFILE") main/binary-amd64/Packages.gz
        SHA1:
         $(sha1sum "$PKGFILE" | awk '{print $1}') $(stat -c%s "$PKGFILE") main/binary-amd64/Packages
         $(sha1sum "$GZFILE" | awk '{print $1}') $(stat -c%s "$GZFILE") main/binary-amd64/Packages.gz
        SHA256:
         $(sha256sum "$PKGFILE" | awk '{print $1}') $(stat -c%s "$PKGFILE") main/binary-amd64/Packages
         $(sha256sum "$GZFILE" | awk '{print $1}') $(stat -c%s "$GZFILE") main/binary-amd64/Packages.gz
        SHA512:
         $(sha512sum "$PKGFILE" | awk '{print $1}') $(stat -c%s "$PKGFILE") main/binary-amd64/Packages
         $(sha512sum "$GZFILE" | awk '{print $1}') $(stat -c%s "$GZFILE") main/binary-amd64/Packages.gz
        RELEOF

          # Remove heredoc indentation
          sed -i 's/^        //' "${DIST_DIR}/Release"

          # Sign with ZODL key (InRelease = clearsign, only supports one signer)
          gpg --batch --yes --clearsign --armor \
            -u sysadmin@zodl.com \
            --output "${DIST_DIR}/InRelease" \
            "${DIST_DIR}/Release"

          # Sign with BOTH keys (Release.gpg = detached, supports multiple signers)
          gpg --batch --yes --detach-sign --armor \
            -u sysadmin@zodl.com -u sysadmin@z.cash \
            --output "${DIST_DIR}/Release.gpg" \
            "${DIST_DIR}/Release"

          # Upload
          for f in Release InRelease Release.gpg; do
            aws s3 cp "${DIST_DIR}/$f" "s3://${BUCKET}/${DIST_DIR}/$f"
          done
          for f in Packages Packages.gz; do
            aws s3 cp "${BINARY_DIR}/$f" "s3://${BUCKET}/${BINARY_DIR}/$f"
          done

          echo "✓ APT metadata updated for $suite"
        done

    - name: Summary
      env:
        VERSION: ${{ inputs.version }}
        SUITES: ${{ inputs.suites }}
      run: |
        echo ""
        echo "=== APT REPO UPDATE COMPLETE ==="
        echo ""
        echo "Verify:"
        for suite in $SUITES; do
          echo "  curl -s https://apt.z.cash/dists/${suite}/main/binary-amd64/Packages | grep -A20 'Version: ${VERSION}'"
        done
